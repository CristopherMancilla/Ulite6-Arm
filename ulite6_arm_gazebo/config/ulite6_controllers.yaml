# ganancia P del lazo de posicion de gz_ros2_control (el valor por
# defecto 0.1 es demasiado bajo y el brazo queda rezagado con gravedad);
# se usa /** porque el nodo del plugin la lee con su propio nombre
/**:
  ros__parameters:
    position_proportional_gain: 60.0

controller_manager:
  ros__parameters:
    update_rate: 150  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ulite6_traj_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    ulite6_gripper_traj_controller:
      type: joint_trajectory_controller/JointTrajectoryController

ulite6_gripper_traj_controller:
  ros__parameters:
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - finger_joint1
    interface_name: position

ulite6_traj_controller:
  ros__parameters:
    # solo posicion: si tambien se reclama velocity, gz_ros2_control aplica
    # unicamente la velocidad (feedforward) y el error de posicion nunca se
    # corrige (queda offset permanente tras cada esquina del trazo)
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      
    # PID por articulación, vel_cmd = p*e + i*∫e + d*(de/dt) + ff*vel_deseada
    #ff es feedforward (la retroalimentación)
    # i_clamp limita el termino integral (anti-windup)
    
    gains:
      joint1: {p: 25.0, i: 2.0, d: 0.4, i_clamp: 3.0, ff_velocity_scale: 1.0}
      joint2: {p: 25.0, i: 2.0, d: 0.4, i_clamp: 3.0, ff_velocity_scale: 1.0}
      joint3: {p: 25.0, i: 2.0, d: 0.4, i_clamp: 3.0, ff_velocity_scale: 1.0}
      joint4: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 2.0, ff_velocity_scale: 1.0}
      joint5: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 2.0, ff_velocity_scale: 1.0}
      joint6: {p: 10.0, i: 1.0, d: 0.1, i_clamp: 2.0, ff_velocity_scale: 1.0}

    constraints:
      goal_time: 2.0
      stopped_velocity_tolerance: 0.0
      joint1: {trajectory: 1.0, goal: 0.02}
      joint2: {trajectory: 1.0, goal: 0.02}
      joint3: {trajectory: 1.0, goal: 0.02}
      joint4: {trajectory: 1.0, goal: 0.02}
      joint5: {trajectory: 1.0, goal: 0.02}
      joint6: {trajectory: 1.0, goal: 0.02}
    interface_name: position
    state_publish_rate: 25.0
    action_monitor_rate: 10.0
